stages:
  - npm_install
  - npm_test
  - npm_build
  - docker_build
  - docker_tag
  - helm_deploy

variables:
  IMAGE_REGISTRY: harbor.online.tkbbank.ru
  IMAGE_REGISTRY_PROJECT: tkbpay
  IMAGE_NAME: $IMAGE_REGISTRY/$IMAGE_REGISTRY_PROJECT/$CI_PROJECT_NAME
  NODE_IMAGE: $IMAGE_REGISTRY/library/node:22.13.1-alpine
  NGINX_IMAGE: $IMAGE_REGISTRY/library/nginx:1.27-alpine
  CHART_REPO: https://harbor.online.tkbbank.ru/chartrepo/kubernetes
  CHART_NAME: kubernetes/payform
  CHART_VERSION: "0.0.9"
  NAMESPACE: payform-refactoring
  REVISION: "1.0.0"

# ── Базовые шаблоны ────────────────────────────────────────────────────────
.runner_template:
  tags:
    - tkbpay
    - docker

.npm_runner:
  extends: .runner_template
  image: $NODE_IMAGE
  variables:
    NEXUS_HOST: nexus.online.tkbbank.ru
  before_script:
    - apk add --no-cache openssl ca-certificates >/dev/null
    - |
      # TOFU: вытаскиваем cert chain прямо у Nexus (s_client -showcerts) и
      # доверяем ему. Корп-Nexus в корп-сети — приемлемо. Когда DevOps пробросит
      # настоящий root CA TCB-ENT-CA в $CERT, переключим на него.

      mkdir -p /tmp/ca
      echo "" | openssl s_client -connect ${NEXUS_HOST}:443 \
        -servername ${NEXUS_HOST} -showcerts 2>/dev/null \
        | sed -n '/-----BEGIN CERTIFICATE-----/,/-----END CERTIFICATE-----/p' \
        > /tmp/ca/from-nexus.pem

      if [ ! -s /tmp/ca/from-nexus.pem ]; then
        echo "ERROR: не удалось забрать cert chain у ${NEXUS_HOST}"; exit 1
      fi

      # Если в $CERT лежит дополнительный сертификат (например, корп. root CA) —
      # подкладываем его рядом, npm/Node будут просматривать оба.
      if [ -n "$CERT" ]; then
        echo "$CERT" > /tmp/ca/from-var.pem
      fi

      cat /tmp/ca/*.pem > /tmp/ca-bundle.pem
      export NODE_EXTRA_CA_CERTS=/tmp/ca-bundle.pem
      npm config set cafile /tmp/ca-bundle.pem

      echo "── CA bundle ────────────────────────────────────────────"
      echo "NODE_EXTRA_CA_CERTS=$NODE_EXTRA_CA_CERTS"
      echo "npm cafile = $(npm config get cafile)"
      echo "npm registry = $(npm config get registry)"
      CHAIN_COUNT=$(grep -c '^-----BEGIN CERTIFICATE-----' /tmp/ca-bundle.pem)
      echo "Сертификатов в bundle: $CHAIN_COUNT"
      # Разбиваем на отдельные файлы для печати инфо
      awk 'BEGIN{n=0} /-----BEGIN CERTIFICATE-----/{n++; out=sprintf("/tmp/c-%02d.pem", n)} {print > out}' /tmp/ca-bundle.pem
      for f in /tmp/c-*.pem; do
        echo "── $f ──"
        openssl x509 -in "$f" -noout -subject -issuer -dates -fingerprint 2>&1 || echo "  не x509"
      done
      echo "─────────────────────────────────────────────────────────"
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull

.docker_runner:
  extends: .runner_template
  image: $IMAGE_REGISTRY/library/docker:25.0.3
  services:
    - name: $IMAGE_REGISTRY/library/docker:25.0.3-dind
      alias: docker
      command: ["--tls=false", "--insecure-registry=harbor.online.tkbbank.ru"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2

# ── Стадии ────────────────────────────────────────────────────────────────
npm_install:
  extends: .npm_runner
  stage: npm_install
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push
  script:
    - node --version
    - npm --version
    - sed -i 's|https://registry.npmjs.org/|https://nexus.online.tkbbank.ru/repository/npmjs/|g' package-lock.json
    - npm ci --no-audit --no-fund --loglevel=verbose

npm_lint:
  extends: .npm_runner
  stage: npm_test
  script:
    - npm run lint

npm_typecheck:
  extends: .npm_runner
  stage: npm_test
  script:
    - npm run typecheck

npm_build:
  extends: .npm_runner
  stage: npm_build
  script:
    - test -f .env
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 30 mins
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^feature\/.*/

docker_build:
  extends: .docker_runner
  stage: docker_build
  dependencies:
    - npm_build
  variables:
    IMAGE_TAG: $REVISION-$CI_COMMIT_SHORT_SHA
  before_script:
    - export DOCKER_BUILDKIT=0
    - export COMPOSE_DOCKER_CLI_BUILD=0
    - echo $IMAGE_REGISTRY_PASSWORD | docker login -u $IMAGE_REGISTRY_USERNAME --password-stdin $IMAGE_REGISTRY
  script:
    - export DATE="$(date +%Y%m%d%H%M)"
    - docker build --build-arg NGINX_IMAGE="$NGINX_IMAGE" -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:$IMAGE_TAG-$DATE .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:$IMAGE_TAG-$DATE
    - docker image rm $IMAGE_NAME:$IMAGE_TAG
    - docker image rm $IMAGE_NAME:$IMAGE_TAG-$DATE
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^feature\/.*/

docker_tag:
  extends: .docker_runner
  stage: docker_tag
  variables:
    IMAGE_TAG: $CI_COMMIT_TAG-$CI_COMMIT_SHORT_SHA
  before_script:
    - export DOCKER_BUILDKIT=0
    - export COMPOSE_DOCKER_CLI_BUILD=0
    - echo $IMAGE_REGISTRY_PASSWORD | docker login -u $IMAGE_REGISTRY_USERNAME --password-stdin $IMAGE_REGISTRY
  script:
    - docker pull $IMAGE_NAME:$IMAGE_TAG
    - docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:$CI_COMMIT_TAG
    - docker push $IMAGE_NAME:$CI_COMMIT_TAG
    - docker image rm $IMAGE_NAME:$CI_COMMIT_TAG
    - docker image rm $IMAGE_NAME:$IMAGE_TAG
  rules:
    - if: $CI_COMMIT_TAG

helm_deploy:
  extends: .docker_runner
  stage: helm_deploy
  variables:
    IMAGE_TAG: $REVISION-$CI_COMMIT_SHORT_SHA
    ENV: test
  script:
    - K8S_CONFIG=K8S_CONFIG_${ENV}
    - chmod 0400 $(echo "${!K8S_CONFIG}")
    - export KUBECONFIG=$(echo "${!K8S_CONFIG}")
    - helm repo add kubernetes --insecure-skip-tls-verify=true $CHART_REPO
    - helm upgrade $CI_PROJECT_NAME --install --insecure-skip-tls-verify=true --version=$CHART_VERSION $CHART_NAME --set image.tag=$IMAGE_TAG -f helm/values-$ENV.yaml --namespace=$NAMESPACE
  when: manual
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^feature\/.*/
