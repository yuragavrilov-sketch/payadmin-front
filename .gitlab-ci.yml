stages:
  - npm_install
  - npm_test
  - npm_build
  - docker_build
  - docker_tag
  - helm_deploy

variables:
  IMAGE_REGISTRY: harbor.online.tkbbank.ru
  IMAGE_REGISTRY_PROJECT: tkbpay
  IMAGE_NAME: $IMAGE_REGISTRY/$IMAGE_REGISTRY_PROJECT/$CI_PROJECT_NAME
  NODE_IMAGE: $IMAGE_REGISTRY/library/node:22.13.1-alpine
  NGINX_IMAGE: $IMAGE_REGISTRY/library/nginx:1.27-alpine
  CHART_REPO: https://harbor.online.tkbbank.ru/chartrepo/kubernetes
  CHART_NAME: kubernetes/payform
  CHART_VERSION: "0.0.9"
  NAMESPACE: payform-refactoring
  REVISION: "1.0.0"

# ── Базовые шаблоны ────────────────────────────────────────────────────────
.runner_template:
  tags:
    - tkbpay
    - docker

.npm_runner:
  extends: .runner_template
  image: $NODE_IMAGE
  before_script:
    - |
      set +e
      echo "── proxy / network env ──"
      env | grep -iE 'proxy' || echo "  (no proxy vars)"
      echo "── npm config ──"
      echo "  registry = $(npm config get registry)"
      echo "  strict-ssl = $(npm config get strict-ssl)"
      # Если в $CERT положили правильный root CA — используем его и убираем
      # strict-ssl=false. До тех пор полагаемся на флаг в .npmrc.
      if [ -n "$CERT" ]; then
        echo "$CERT" > /tmp/ca-cert.pem
        export NODE_EXTRA_CA_CERTS=/tmp/ca-cert.pem
        npm config set cafile /tmp/ca-cert.pem
        echo "  cafile = /tmp/ca-cert.pem (cert size: $(wc -c < /tmp/ca-cert.pem)b)"
      fi
      set -e
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull

.docker_runner:
  extends: .runner_template
  image: $IMAGE_REGISTRY/library/docker:25.0.3
  # DinD service в раннере не стартует (не privileged?). Полагаемся на то, что
  # раннер монтирует host's docker socket в build-контейнер. Если сокета нет —
  # просим DevOps включить privileged=true либо смонтировать /var/run/docker.sock.
  variables:
    DOCKER_DRIVER: overlay2

# ── Стадии ────────────────────────────────────────────────────────────────
npm_install:
  extends: .npm_runner
  stage: npm_install
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push
  script:
    - node --version
    - npm --version
    - sed -i 's|https://registry.npmjs.org/|https://nexus.online.tkbbank.ru/repository/npmjs/|g' package-lock.json
    - npm ci --no-audit --no-fund
  artifacts:
    paths:
      - node_modules/
    expire_in: 1h

npm_lint:
  extends: .npm_runner
  stage: npm_test
  dependencies:
    - npm_install
  script:
    - npm run lint

npm_typecheck:
  extends: .npm_runner
  stage: npm_test
  dependencies:
    - npm_install
  script:
    - npm run typecheck

npm_build:
  extends: .npm_runner
  stage: npm_build
  dependencies:
    - npm_install
  script:
    - test -f .env
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 30 mins
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^feature\/.*/

docker_build:
  extends: .docker_runner
  stage: docker_build
  dependencies:
    - npm_build
  before_script:
    - export DOCKER_BUILDKIT=0
    - export COMPOSE_DOCKER_CLI_BUILD=0
    - echo $IMAGE_REGISTRY_PASSWORD | docker login -u $IMAGE_REGISTRY_USERNAME --password-stdin $IMAGE_REGISTRY
  script:
    - export REVISION="${REVISION:-1.0.0}"
    - export DATE="$(date +%Y%m%d%H%M)"
    - export IMAGE_TAG="${REVISION}-${CI_COMMIT_SHORT_SHA}"
    - echo "Building $IMAGE_NAME:$IMAGE_TAG (also $IMAGE_TAG-$DATE)"
    - docker build --build-arg NGINX_IMAGE="$NGINX_IMAGE" -t "$IMAGE_NAME:$IMAGE_TAG" -t "$IMAGE_NAME:$IMAGE_TAG-$DATE" .
    - docker push "$IMAGE_NAME:$IMAGE_TAG"
    - docker push "$IMAGE_NAME:$IMAGE_TAG-$DATE"
    - docker image rm "$IMAGE_NAME:$IMAGE_TAG" || true
    - docker image rm "$IMAGE_NAME:$IMAGE_TAG-$DATE" || true
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^feature\/.*/

docker_tag:
  extends: .docker_runner
  stage: docker_tag
  before_script:
    - export DOCKER_BUILDKIT=0
    - export COMPOSE_DOCKER_CLI_BUILD=0
    - echo $IMAGE_REGISTRY_PASSWORD | docker login -u $IMAGE_REGISTRY_USERNAME --password-stdin $IMAGE_REGISTRY
  script:
    - export IMAGE_TAG="${CI_COMMIT_TAG}-${CI_COMMIT_SHORT_SHA}"
    - docker pull "$IMAGE_NAME:$IMAGE_TAG"
    - docker tag  "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:$CI_COMMIT_TAG"
    - docker push "$IMAGE_NAME:$CI_COMMIT_TAG"
    - docker image rm "$IMAGE_NAME:$CI_COMMIT_TAG" || true
    - docker image rm "$IMAGE_NAME:$IMAGE_TAG" || true
  rules:
    - if: $CI_COMMIT_TAG

helm_deploy:
  extends: .docker_runner
  stage: helm_deploy
  variables:
    ENV: test
  script:
    - export REVISION="${REVISION:-1.0.0}"
    - export IMAGE_TAG="${REVISION}-${CI_COMMIT_SHORT_SHA}"
    - K8S_CONFIG=K8S_CONFIG_${ENV}
    - chmod 0400 $(echo "${!K8S_CONFIG}")
    - export KUBECONFIG=$(echo "${!K8S_CONFIG}")
    - helm repo add kubernetes --insecure-skip-tls-verify=true $CHART_REPO
    - helm upgrade $CI_PROJECT_NAME --install --insecure-skip-tls-verify=true --version=$CHART_VERSION $CHART_NAME --set image.tag=$IMAGE_TAG -f helm/values-$ENV.yaml --namespace=$NAMESPACE
  when: manual
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^feature\/.*/
